<main class="auth-page">
  <a class="auth-brand" routerLink="/" aria-label="Voltar para Tech Tees">
    <span>♛</span>
    <strong>TECH TEES</strong>
    <small>BRASIL</small>
  </a>

  <section class="auth-card">
    <div class="auth-heading">
      <span>Minha conta</span>
      <h1>Entre para finalizar.</h1>
      <p *ngIf="checkoutReason">Entre na sua conta para finalizar a compra. Seu carrinho está guardado.</p>
      <p *ngIf="!checkoutReason">Acesse sua conta e continue de onde parou.</p>
    </div>

    <p class="auth-alert" *ngIf="!firebaseConfigured">
      Firebase Auth ainda não foi configurado neste ambiente.
    </p>

    <form (ngSubmit)="submit()" novalidate>
      <label>
        E-mail
        <input
          name="email"
          type="email"
          autocomplete="email"
          [(ngModel)]="email"
          [disabled]="loading"
          placeholder="voce@email.com"
        />
      </label>
      <label>
        Senha
        <input
          name="password"
          type="password"
          autocomplete="current-password"
          [(ngModel)]="password"
          [disabled]="loading"
          placeholder="Sua senha"
        />
      </label>

      <p class="auth-error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button class="auth-primary" type="submit" [disabled]="loading || !firebaseConfigured">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="auth-divider"><span>ou</span></div>

    <button class="auth-google" type="button" (click)="loginWithGoogle()" [disabled]="loading || !firebaseConfigured">
      <span aria-hidden="true">G</span>
      Continuar com Google
    </button>

    <p class="auth-switch">
      Ainda não tem conta?
      <a routerLink="/cadastro" [queryParams]="{ returnUrl: route.snapshot.queryParamMap.get('returnUrl') }">Criar conta</a>
    </p>
  </section>
</main>
